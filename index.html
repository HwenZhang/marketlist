<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>二手闲置物品清单</title>
<style>
  :root { --line: #e2e2e2; }
  * { box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: #1a1a1a;
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  h1 { font-size: 26px; text-align: center; margin-bottom: 8px; }
  p.sub { text-align: center; color: #8a7d75; margin: 0 0 8px; }
  h2 {
    font-size: 20px;
    margin: 36px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #333;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    border: 1px solid var(--line);
    padding: 10px 12px;
    text-align: left;
    vertical-align: middle;
  }
  th { background: #f5f5f5; font-weight: 600; white-space: nowrap; }
  tbody tr:nth-child(even) { background: #fafafa; }
  td.item { font-weight: 500; min-width: 180px; }
  td.price { font-weight: 700; color: #c0392b; white-space: nowrap; }
  td.ship { white-space: nowrap; color: #555; font-size: 14px; }
  a.link {
    display: inline-block;
    padding: 4px 10px;
    background: #2d6cdf;
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
  }
  a.link:hover { background: #1b50b0; }
  a.resp {
    display: inline-block;
    padding: 4px 10px;
    background: #1e9e5a;
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    white-space: nowrap;
  }
  a.resp:hover { background: #157a44; }
  .muted { color: #aaa; }
  /* 图片缩略图，点击放大 */
  img.thumb {
    height: 72px;
    width: auto;
    border-radius: 6px;
    cursor: zoom-in;
    display: block;
  }
  .lightbox { display: none; }
  .lightbox:target {
    display: flex;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }

  /* ===== chiikawa 风格可爱装饰（原创插画）===== */
  html {
    background:
      radial-gradient(circle at 18% 12%, #fff0f5 0, transparent 38%),
      radial-gradient(circle at 85% 6%, #eef6ff 0, transparent 34%),
      radial-gradient(circle at 90% 88%, #fff6e6 0, transparent 34%),
      #fdf4f7;
  }
  body {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 8px 34px rgba(190, 130, 160, .14);
    position: relative;
    z-index: 1;
    margin-top: 28px;
    margin-bottom: 56px;
  }
  h1 .mascot { vertical-align: middle; margin: 0 4px; }
  h2 { border-bottom-color: #ffc2d4; }
  th { background: #fff2f6; }
  tbody tr:nth-child(even) { background: #fff8fb; }
  .deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .deco svg { position: fixed; filter: drop-shadow(0 4px 5px rgba(0,0,0,.08)); }
  .deco .c1 { top: 20px; left: 18px; transform: rotate(-8deg); }
  .deco .c2 { bottom: 26px; left: 26px; transform: rotate(7deg); }
  .deco .c3 { top: 150px; right: 22px; transform: rotate(9deg); }
  .deco .c4 { bottom: 28px; right: 20px; transform: rotate(-7deg); }
  .deco .c5 { top: 46%; left: 12px; transform: rotate(4deg); }
  .deco .c6 { top: 40%; right: 14px; transform: rotate(-5deg); }
  @media (max-width: 1180px) { .deco .side { display: none; } }
</style>
</head>
<body>

     线上默认显示真实价格；想看免费版在网址后加 ?free=1。

  const ITEM_ENTRY  = "entry.1744656898";
  const CLAIMED_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNMMbQ3Q4H3-0n-w84dn0oVnQbPd5kAWoWzwN7EYdowhtiNIbiLl0r9E6s3vOAFTnZEpslIrsZ26LO/pub?gid=378112170&single=true&output=csv";

  /* ITEMS_START — 由 build.py 从 secondhand_items_free.md 自动生成，勿手改 */

    // ---------- 电子产品 ----------
    { cat:"电子产品", name:"Xbox Series S(512GB) 游戏机 + 一个 Xbox手柄", price:"50£", link:"https://www.xbox.com/zh-CN/consoles/xbox-series-s?xr=shellnav", img:"figures/IMG_2034.jpeg", ship:"Marston 自取" },
    { cat:"电子产品", name:"LG 4k 显示器", price:"50£", link:"https://www.amazon.co.uk/dp/B07R9M25CT?ref=ppx_yo2ov_dt_b_fed_asin_title", img:"", ship:"6.18后 Science Area 自取" },
    { cat:"电子产品", name:"KOORUI 165Hz, FHD 1080P 显示器", price:"10£", link:"https://www.amazon.co.uk/dp/B0B2RCXTK9?ref=ppx_yo2ov_dt_b_fed_asin_title&th=1", img:"figures/IMG_2035.jpeg", ship:"Marston 自取" },

    { cat:"电子产品", name:"Instant Pot 高压锅", price:"0£", link:"https://www.amazon.co.uk/dp/B00OP26T4K?ref=ppx_yo2ov_dt_b_fed_asin_title&th=1", img:"figures/IMG_2045.jpeg", ship:"Marston 自取" },
    { cat:"电子产品", name:"体重秤", price:"0£", link:"https://www.amazon.co.uk/dp/B071GYHSFX?ref=ppx_yo2ov_dt_b_fed_asin_title", img:"", ship:"Marston 自取" },
    { cat:"电子产品", name:"小音箱", price:"0£", link:"https://www.amazon.co.uk/dp/B07VVP8BGD?ref=ppx_yo2ov_dt_b_fed_asin_title", img:"figures/IMG_2038.jpeg", ship:"Marston 自取" },
    { cat:"电子产品", name:"可充电小台灯", price:"0£", link:"", img:"figures/IMG_2042.jpeg", ship:"Science Area 自取" },
    { cat:"电子产品", name:"无线耳机", price:"0£", link:"", img:"figures/IMG_2044.jpeg", ship:"Marston 自取" },
    // ---------- 日用品 ----------
    { cat:"日用品", name:"骑行头盔", price:"0£", link:"https://www.amazon.co.uk/dp/B085HP95Z2?ref=ppx_yo2ov_dt_b_fed_asin_title&th=1", img:"", ship:"Marston or Science Area 自取" },
    { cat:"日用品", name:"接线板", price:"0£", link:"https://www.amazon.co.uk/dp/B07ZGDK9L5?ref=ppx_yo2ov_dt_b_fed_asin_title&th=1", img:"", ship:"Marston 自取" },
    { cat:"日用品", name:"小汤锅(有盖)", price:"0£", link:"https://www.amazon.co.uk/dp/B09DC7GD5C?ref=ppx_yo2ov_dt_b_fed_asin_title", img:"figures/IMG_2048.jpeg", ship:"6.14后 Marston 自取" },
    { cat:"日用品", name:"炒菜锅", price:"0£", link:"", img:"figures/IMG_2046.jpeg", ship:"6.14后 Marston 自取" },
    { cat:"日用品", name:"充电电池x4+充电器", price:"0£", link:"https://www.amazon.co.uk/dp/B00HZV9TGS?ref=ppx_yo2ov_dt_b_fed_asin_title&th=1", img:"", ship:"Science Area or Marston 自取" },
    { cat:"日用品", name:"HEAD Ti S6 Titanium 网球拍 + 网球12个", price:"15£", link:"https://www.amazon.co.uk/dp/B002KDM7EM?ref=ppx_yo2ov_dt_b_fed_asin_title&th=1", img:"figures/IMG_2039.jpeg", ship:"Science Area 自取" },
    { cat:"日用品", name:"壁球拍 + 壁球 2 个", price:"10£", link:"https://www.racketworld.co.uk/products/head-nano-ti-110-titanium-squash-racket", img:"figures/IMG_2040.jpeg", ship:"Science Area 自取" },
    { cat:"日用品", name:"小桌子", price:"5£", link:"https://www.racketworld.co.uk/products/head-nano-ti-110-titanium-squash-racket", img:"figures/IMG_2037.jpeg", ship:"Marston 自取" },
    // ---------- 书籍(有些是其他小伙伴送给我的，在此表示感谢) ----------
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Stories of Hope", price:"0", link:"", img:"figures/IMG_2041.jpeg", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Elementary Engineering Fracture Mechanics", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"战争的试炼：十字军东征史", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"不能承受的生命之轻", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"沉默的大多数", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"金瓶梅（上）", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"金瓶梅（下）", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Middlemarch", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Essential C++ 中文版", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Creep and Fracture of Ice", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Statistics for Economics, Accounting and Business Studies", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"初级日语 第一册 第2版", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"初级日语 第二册 第2版", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"An Introduction to Physical Geography and the Environment", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"The Stress Analysis of Cracks Handbook", price:"0", link:"", img:"", ship:"Science Area 自取" },
    { cat:"书籍(有些是其他小伙伴送给我的，在此表示感谢)", name:"Lonely Castle in the Mirror(镜之孤城)", price:"0", link:"", img:"", ship:"Science Area 自取" },
  ];
  /* ITEMS_END */

  const norm = s => (s || "").replace(/\s+/g, " ").trim();

  function parseSingleColumnCSV(text) {
    const out = [];
    text.split(/\r?\n/).forEach(line => {
      if (line === "") return;
      let v = line;
      if (v[0] === '"' && v[v.length - 1] === '"') v = v.slice(1, -1).replace(/""/g, '"');
      out.push(norm(v));
    });
    return out;
  }

  document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(location.search);
    let priced = !FREE_MODE;
    if (params.get("priced") === "1") priced = true;
    if (params.get("free") === "1") priced = false;
    const root = document.getElementById("list");
    const cats = [...new Set(ITEMS.map(it => it.cat))];
    const lightboxes = [];
    let imgN = 0;

    cats.forEach(cat => {
      const h2 = document.createElement("h2");
      h2.textContent = cat;
      root.appendChild(h2);

      const table = document.createElement("table");
      table.innerHTML = "<thead><tr><th>物品</th><th>价格</th><th>链接</th><th>图片</th><th>配送方式</th><th>回应</th></tr></thead>";
      const tbody = document.createElement("tbody");

      ITEMS.filter(it => it.cat === cat).forEach(it => {
        const tr = document.createElement("tr");
        tr.dataset.item = norm(it.name);

        const tdItem = document.createElement("td");
        tdItem.className = "item";
        tdItem.textContent = it.name;

        const tdPrice = document.createElement("td");
        tdPrice.className = "price";
        tdPrice.textContent = priced ? it.price : "0";

        const tdLink = document.createElement("td");
        if (it.link) {
          const a = document.createElement("a");
          a.className = "link"; a.href = it.link; a.target = "_blank"; a.rel = "noopener";
          a.textContent = "查看";
          tdLink.appendChild(a);
        } else { tdLink.className = "muted"; tdLink.textContent = "无"; }

        const tdImg = document.createElement("td");
        if (it.img) {
          imgN++;
          const a = document.createElement("a"); a.href = "#img" + imgN;
          const img = document.createElement("img"); img.className = "thumb"; img.src = it.img; img.alt = "";
          a.appendChild(img); tdImg.appendChild(a);
          const lb = document.createElement("a"); lb.href = "#"; lb.id = "img" + imgN; lb.className = "lightbox";
          const big = document.createElement("img"); big.src = it.img; big.alt = "";
          lb.appendChild(big); lightboxes.push(lb);
        } else { tdImg.className = "muted"; tdImg.textContent = "无"; }

        const tdShip = document.createElement("td");
        tdShip.className = "ship"; tdShip.textContent = it.ship;

        const tdResp = document.createElement("td");
        const r = document.createElement("a");
        r.className = "resp"; r.target = "_blank"; r.rel = "noopener"; r.textContent = "预订 →";
        try {
          const u = new URL(FORM_BASE);
          u.searchParams.set("usp", "pp_url");
          u.searchParams.set(ITEM_ENTRY, it.name);
          r.href = u.toString();
        } catch (e) { r.href = FORM_BASE; }
        tdResp.appendChild(r);

        tr.append(tdItem, tdPrice, tdLink, tdImg, tdShip, tdResp);
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      root.appendChild(table);
    });

    lightboxes.forEach(lb => document.body.appendChild(lb));

    // 拉取“已登记物品”，隐藏对应条目
    if (!CLAIMED_CSV) return;
    try {
      const sep = CLAIMED_CSV.includes("?") ? "&" : "?";
      const res = await fetch(CLAIMED_CSV + sep + "t=" + Date.now());
      const claimed = new Set(parseSingleColumnCSV(await res.text()));
      document.querySelectorAll("#list tbody tr").forEach(tr => {
        if (claimed.has(tr.dataset.item)) tr.style.display = "none";
      });
      document.querySelectorAll("#list table").forEach(tbl => {
        const anyVisible = [...tbl.querySelectorAll("tbody tr")].some(tr => tr.style.display !== "none");
        if (!anyVisible) {
          tbl.style.display = "none";
          const h2 = tbl.previousElementSibling;
          if (h2 && h2.tagName === "H2") h2.style.display = "none";
        }
      });
    } catch (e) {
      console.warn("无法加载已登记列表，全部正常显示：", e);
    }
  });
</script>

</body>
</html>
